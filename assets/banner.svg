<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left Bracket -->
  <text x="130" y="130" font-family="monospace" font-size="80" font-weight="bold" fill="url(#grad1)" filter="url(#glow)">{</text>

  <!-- Brain / Lightning Bolt Symbol -->
  <path d="M 230 60 L 210 100 L 240 100 L 220 140 L 260 90 L 230 90 Z" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Right Bracket -->
  <text x="280" y="130" font-family="monospace" font-size="80" font-weight="bold" fill="url(#grad1)" filter="url(#glow)">}</text>

  <!-- Core Text -->
  <text x="350" y="125" font-family="sans-serif" font-size="64" font-weight="900" fill="#E2E8F0" letter-spacing="-1">Context<tspan fill="url(#grad1)">Slim</tspan></text>
</svg>
